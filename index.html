```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Something Special ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);

    color:white;
    position:relative;
}

/* CARD */

.card{

    width:90%;
    max-width:520px;

    text-align:center;

    background:rgba(255,255,255,0.12);

    padding:40px;

    border-radius:25px;

    backdrop-filter: blur(12px);

    box-shadow:0 0 25px rgba(255,255,255,0.2);

    z-index:10;

    transition:0.5s ease;
}

/* TEXT */

h1{
    margin-bottom:15px;
    font-size:32px;

    text-shadow:0 0 10px #ff4d6d;
}

p{
    margin-top:10px;
    font-size:18px;
    line-height:1.5;
}

/* CAT */

.cat{
    font-size:55px;
    margin-bottom:10px;
}

/* BUTTONS */

button{

    padding:13px 24px;

    border:none;

    border-radius:25px;

    margin:12px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:
        transform 0.2s ease,
        background 0.3s ease,
        box-shadow 0.3s ease;
}

button:hover{
    transform:scale(1.08);
}

.yes{

    background:#00c853;

    color:white;

    box-shadow:0 0 15px rgba(0,200,83,0.6);
}

.no{

    background:#d50000;

    color:white;

    box-shadow:0 0 15px rgba(213,0,0,0.5);
}

/* FLOATING ITEMS */

.heart,
.rose{

    position:absolute;

    pointer-events:none;

    animation: floatUp linear forwards;
}

.heart{
    color:#ff4d6d;
}

/* FLOATING ANIMATION */

@keyframes floatUp{

    0%{
        transform:translateY(100vh) rotate(0deg);
        opacity:1;
    }

    100%{
        transform:translateY(-15vh) rotate(360deg);
        opacity:0;
    }
}

/* FIREWORKS */

.spark{

    position:absolute;

    width:10px;
    height:10px;

    border-radius:50%;

    animation: boom 1s linear forwards;
}

@keyframes boom{

    0%{
        transform:scale(1);
        opacity:1;
    }

    100%{
        transform:scale(4);
        opacity:0;
    }
}

/* FINAL GLOW */

.final-message{

    animation: glow 1.5s infinite alternate;
}

@keyframes glow{

    from{
        text-shadow:0 0 10px #ff4d6d;
    }

    to{
        text-shadow:
            0 0 20px #ff4d6d,
            0 0 35px #ff4d6d;
    }
}

/* MOBILE */

@media(max-width:600px){

    h1{
        font-size:25px;
    }

    p{
        font-size:16px;
    }

    button{
        font-size:15px;
    }
}

</style>
</head>

<body>

<!-- MUSIC -->

<audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- CARD -->

<div class="card" id="box">

    <div class="cat">😿</div>

    <h1>💖 I Have Something Special To Tell You 💖</h1>

    <p>
        Someone wants to say something from the heart...
    </p>

    <button class="yes" onclick="startExperience()">
        Tap To Begin ❤️
    </button>

</div>

<script>

/* =========================
   MUSIC
========================= */

function startMusic(){

    const music = document.getElementById("song");

    music.play().catch(() => {

        console.log("Music autoplay blocked");

    });
}

/* =========================
   START EXPERIENCE
========================= */

function startExperience(){

    startMusic();

    step1();
}

/* =========================
   STEP 1
========================= */

function step1(){

    document.getElementById("box").innerHTML = `

        <div class="cat">🥺</div>

        <h1>💭 Be Honest With Me...</h1>

        <p>Do you trust me?</p>

        <button class="yes" onclick="step2()">
            YES 💖
        </button>

        <button class="no" id="no1">
            NO 💔
        </button>

    `;

    setupNo("no1");
}

/* =========================
   STEP 2
========================= */

function step2(){

    document.getElementById("box").innerHTML = `

        <div class="cat">😭</div>

        <h1>💞 Do You Love Me?</h1>

        <p>
            Think carefully before answering 😳
        </p>

        <button class="yes" onclick="finalStep()">
            YES 💖
        </button>

        <button class="no" id="no2">
            NO 💔
        </button>

    `;

    setupNo("no2");
}

/* =========================
   FINAL STEP
========================= */

function finalStep(){

    document.getElementById("box").innerHTML = `

        <div class="cat">💖😭💖</div>

        <h1 class="final-message">
            💖 I Knew It 💖
        </h1>

        <p>
            I love you more than words can explain 🫶
        </p>

        <p>
            Please stay with me forever ❤️
        </p>

    `;

    startFireworks();

    startRoses();
}

/* =========================
   MOVING NO BUTTON
========================= */

function setupNo(id){

    const noBtn = document.getElementById(id);

    function moveNo(){

        const btnWidth = noBtn.offsetWidth;
        const btnHeight = noBtn.offsetHeight;

        const maxX =
            window.innerWidth - btnWidth - 20;

        const maxY =
            window.innerHeight - btnHeight - 20;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.position = "fixed";

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";

        noBtn.style.zIndex = "999";
    }

    /* DESKTOP */
    noBtn.addEventListener(
        "mouseenter",
        moveNo
    );

    /* MOBILE */
    noBtn.addEventListener(
        "touchstart",
        function(e){

            e.preventDefault();

            moveNo();
        }
    );

    /* EXTRA SAFETY */
    noBtn.addEventListener(
        "click",
        function(e){

            e.preventDefault();

            moveNo();
        }
    );
}

/* =========================
   FIREWORKS
========================= */

let fireworksInterval;

function startFireworks(){

    clearInterval(fireworksInterval);

    fireworksInterval = setInterval(() => {

        for(let i=0;i<10;i++){

            let s = document.createElement("div");

            s.className = "spark";

            const colors = [

                "#ff4d6d",
                "#ffd60a",
                "#00e5ff",
                "#ffffff",
                "#ff9e00"

            ];

            s.style.background =

                colors[
                    Math.floor(
                        Math.random() * colors.length
                    )
                ];

            s.style.left =
                Math.random() * 100 + "vw";

            s.style.top =
                Math.random() * 100 + "vh";

            document.body.appendChild(s);

            setTimeout(() => {

                s.remove();

            },1000);
        }

    },300);
}

/* =========================
   FLOATING HEARTS
========================= */

setInterval(() => {

    let heart = document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = "💖";

    heart.style.left =
        Math.random() * 100 + "vw";

    heart.style.fontSize =
        (20 + Math.random()*30) + "px";

    heart.style.animationDuration =
        (4 + Math.random()*4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {

        heart.remove();

    },7000);

},250);

/* =========================
   FLOATING ROSES
========================= */

function startRoses(){

    setInterval(() => {

        let rose = document.createElement("div");

        rose.className = "rose";

        rose.innerHTML = "🌹";

        rose.style.left =
            Math.random() * 100 + "vw";

        rose.style.fontSize =
            (20 + Math.random()*20) + "px";

        rose.style.animationDuration =
            (5 + Math.random()*3) + "s";

        document.body.appendChild(rose);

        setTimeout(() => {

            rose.remove();

        },7000);

    },400);
}

</script>

</body>
</html>
```
