<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Proposal ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Arial,sans-serif;

    background:linear-gradient(
        135deg,
        #0f0c29,
        #302b63,
        #24243e
    );

    color:white;

    position:relative;
}

/* CARD */

.card{

    width:90%;

    max-width:500px;

    padding:40px;

    text-align:center;

    border-radius:20px;

    background:rgba(255,255,255,0.1);

    backdrop-filter:blur(10px);

    box-shadow:0 0 25px rgba(255,255,255,0.2);

    z-index:5;
}

/* TEXT */

h1{

    font-size:32px;

    margin-bottom:15px;

    text-shadow:0 0 10px #ff4d6d;
}

p{

    font-size:18px;

    margin-top:10px;
}

.cat{

    font-size:55px;

    margin-bottom:10px;
}

/* BUTTONS */

button{

    padding:13px 24px;

    border:none;

    border-radius:30px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    margin:12px;

    transition:0.2s;
}

button:hover{

    transform:scale(1.08);
}

.yes{

    background:#00c853;

    color:white;
}

.no{

    background:#d50000;

    color:white;
}

/* FLOATING HEARTS */

.heart,
.rose{

    position:absolute;

    pointer-events:none;

    animation:floatUp linear forwards;
}

@keyframes floatUp{

    0%{

        transform:
            translateY(100vh)
            rotate(0deg);

        opacity:1;
    }

    100%{

        transform:
            translateY(-15vh)
            rotate(360deg);

        opacity:0;
    }
}

/* FIREWORKS */

.spark{

    position:absolute;

    width:10px;

    height:10px;

    border-radius:50%;

    animation:boom 1s linear forwards;
}

@keyframes boom{

    0%{

        transform:scale(1);

        opacity:1;
    }

    100%{

        transform:scale(4);

        opacity:0;
    }
}

.final-message{

    animation:glow 1s infinite alternate;
}

@keyframes glow{

    from{
        text-shadow:0 0 10px #ff4d6d;
    }

    to{
        text-shadow:
            0 0 20px #ff4d6d,
            0 0 35px #ff4d6d;
    }
}

</style>

</head>

<body>

<audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="card" id="box">

```
<div class="cat">😿</div>

<h1>
    💖 I Have Something Special To Tell You 💖
</h1>

<p>
    Someone wants to say something...
</p>

<button
    class="yes"
    onclick="startExperience()">

    Tap To Begin ❤️

</button>
```

</div>

<script>

/* MUSIC */

function startMusic(){

    const music =
        document.getElementById("song");

    music.play().catch(() => {});
}

/* START */

function startExperience(){

    startMusic();

    step1();
}

/* STEP 1 */

function step1(){

    document.getElementById("box").innerHTML = `

        <div class="cat">🥺</div>

        <h1>
            💭 Be Honest With Me...
        </h1>

        <p>
            Do you trust me?
        </p>

        <button
            class="yes"
            onclick="step2()">

            YES 💖

        </button>

        <button
            class="no"
            id="noBtn">

            NO 💔

        </button>

    `;

    setupNo();
}

/* STEP 2 */

function step2(){

    document.getElementById("box").innerHTML = `

        <div class="cat">😭</div>

        <h1>
            💞 Do You Love Me?
        </h1>

        <p>
            Think carefully 😳
        </p>

        <button
            class="yes"
            onclick="finalStep()">

            YES 💖

        </button>

        <button
            class="no"
            id="noBtn">

            NO 💔

        </button>

    `;

    setupNo();
}

/* FINAL */

function finalStep(){

    document.getElementById("box").innerHTML = `

        <div class="cat">💖😭💖</div>

        <h1 class="final-message">
            💖 I Knew It 💖
        </h1>

        <p>
            I love you so much 🫶
        </p>

        <p>
            Stay mine forever ❤️
        </p>

    `;

    startFireworks();

    startRoses();
}

/* MOVING NO BUTTON */

function setupNo(){

    const noBtn =
        document.getElementById("noBtn");

    function moveButton(){

        const btnWidth =
            noBtn.offsetWidth;

        const btnHeight =
            noBtn.offsetHeight;

        const maxX =
            window.innerWidth -
            btnWidth -
            20;

        const maxY =
            window.innerHeight -
            btnHeight -
            20;

        const randomX =
            Math.random() * maxX;

        const randomY =
            Math.random() * maxY;

        noBtn.style.position = "fixed";

        noBtn.style.left =
            randomX + "px";

        noBtn.style.top =
            randomY + "px";
    }

    noBtn.addEventListener(
        "mouseover",
        moveButton
    );

    noBtn.addEventListener(
        "touchstart",
        moveButton
    );

    noBtn.addEventListener(
        "click",
        function(e){

            e.preventDefault();

            moveButton();
        }
    );
}

/* FIREWORKS */

function startFireworks(){

    setInterval(() => {

        for(let i=0;i<10;i++){

            let spark =
                document.createElement("div");

            spark.className = "spark";

            const colors = [

                "#ff4d6d",
                "#ffd60a",
                "#00e5ff",
                "#ffffff",
                "#ff9e00"

            ];

            spark.style.background =

                colors[
                    Math.floor(
                        Math.random() *
                        colors.length
                    )
                ];

            spark.style.left =
                Math.random() * 100 + "vw";

            spark.style.top =
                Math.random() * 100 + "vh";

            document.body.appendChild(spark);

            setTimeout(() => {

                spark.remove();

            },1000);
        }

    },300);
}

/* HEARTS */

setInterval(() => {

    let heart =
        document.createElement("div");

    heart.className = "heart";

    heart.innerHTML = "💖";

    heart.style.left =
        Math.random() * 100 + "vw";

    heart.style.fontSize =
        (20 + Math.random()*30) + "px";

    heart.style.animationDuration =
        (4 + Math.random()*4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {

        heart.remove();

    },7000);

},250);

/* ROSES */

function startRoses(){

    setInterval(() => {

        let rose =
            document.createElement("div");

        rose.className = "rose";

        rose.innerHTML = "🌹";

        rose.style.left =
            Math.random() * 100 + "vw";

        rose.style.fontSize =
            (20 + Math.random()*20) + "px";

        rose.style.animationDuration =
            (5 + Math.random()*3) + "s";

        document.body.appendChild(rose);

        setTimeout(() => {

            rose.remove();

        },7000);

    },400);
}

</script>

</body>
</html>
